name: Yasmine Project CI-CD

on:
  push:
    branches: [ "main" ] # Runs every time you push code to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/yasmine-backend:${{ github.run_id }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yasmine-backend:${{ github.run_id }}

          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/yasmine-backend:${{ github.run_id }} ${{ secrets.DOCKERHUB_USERNAME }}/yasmine-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yasmine-backend:latest

      - name: Build and Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/yasmine-frontend:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yasmine-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Log in to Docker Hub on EC2
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            cd full-stack-fastapi-template
            
            # Pull the new images from Docker Hub
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/yasmine-backend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/yasmine-frontend:latest
            
            # Restart the containers with the new images
            docker compose up -d
